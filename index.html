<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin the Bottle Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startPage" class="page active">
    <h1>Welcome to <b>MatchME</b> Spin the Bottle!</h1><br>
    <button onclick="showPage('modePage')">Start Game</button>
</div>

<div id="modePage" class="page">
    <h2>Select Mode</h2><br>
    <button onclick="setMode('single')">Single Mode</button>
    <button onclick="setMode('match')">Match Mode</button>
</div>

<div id="playerPage" class="page">
    <h2 id="playerPageTitle"></h2>
    <div id="playerInputs"></div>
    <div class="button-group">
        <button onclick="showPage('modePage')" style="background: #6c757d;">Back to Modes</button>
        <button onclick="startGame()">Start Game</button>
    </div>
</div>

<div id="spinnerPage" class="page">
    <h2>Who will be selected?</h2>
    
    <div id="bottleContainer">
        <img src="picture/bottle.png" id="bottle" alt="Bottle">
    </div>
    
    <button onclick="spin()">Spin!</button>
    
    <h3 id="selectedPlayer"></h3>
    
    <button id="openBoxBtn" onclick="setupChallenges()" style="display:none;">Open a Challenge Box!</button>
    
    <br>
    <button onclick="resetToHome()" style="background: #dc3545; margin-top: 50px; font-size: 14px;">Reset All & Exit</button>
</div>

<div id="challengePage" class="page">
    <h2>Choose your fate!</h2>
    <p>Click only one box to reveal your challenge.</p>
    
    <div id="boxContainer"></div>
    
    <button id="continueBtn" onclick="nextRound()" style="display:none;">Continue to Next Round</button>
</div>

<audio id="spinSound" src="spin.mp3"></audio>
<audio id="boxSound" src="box.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
